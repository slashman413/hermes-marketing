name: Daily Marketing

on:
  schedule:
    - cron: "0 8,12,18 * * *"  # 3x daily
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  market:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tweepy
        run: pip install tweepy

      - name: Generate & post marketing content
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/marketing.py all

      - name: Commit to main
        run: |
          git config user.name "hermes-agent"
          git config user.email "hermes@nousresearch.com"
          git add docs/
          git diff --staged --quiet || git commit -m "auto: daily marketing content"
          git push

      - name: Deploy marketing page
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: false

  notify-failure:
    needs: [market]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true

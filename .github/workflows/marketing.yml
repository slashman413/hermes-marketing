name: Daily Marketing

on:
  schedule:
    - cron: "0 8,12,18 * * *"  # 3x daily
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate marketing content
        run: python scripts/marketing.py all

      - name: Deploy SEO page
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

      - name: Commit
        run: |
          git config user.name "hermes-agent"
          git config user.email "hermes@nousresearch.com"
          git add docs/
          git diff --staged --quiet || git commit -m "auto: daily marketing content"
          git push
